<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>PostAR</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <a href="https://github.com/ubiquitous-o/PostAR" target="_blank" rel="noopener" class="github-link" aria-label="GitHub">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <h1>Post<span class="accent">AR</span></h1>
        <p class="tagline" data-i18n="tagline">ポスターを実寸ARで確認</p>
      </header>

      <!-- Notes -->
      <div class="notes">
        <details>
          <summary data-i18n="notesTitle">ご利用にあたって</summary>
          <ul>
            <li data-i18n="noteApprox">表示されるサイズはあくまで目安です。実際の印刷物とは若干異なる場合があります</li>
            <li data-i18n="noteDevice">AR表示にはiOS 12+（Quick Look対応）またはAndroid（ARCore対応）のデバイスが必要です</li>
            <li data-i18n="noteScale">AR上で拡大縮小した場合、実寸とは異なります</li>
            <li data-i18n="noteColor">画面の明るさや色味により、実際の印刷結果と色が異なって見える場合があります</li>
            <li data-i18n="notePrivacy">アップロードされた画像はサーバーに送信されず、すべてブラウザ上で処理されます</li>
          </ul>
        </details>
      </div>

      <!-- Image Upload -->
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-prompt">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
          </svg>
          <span data-i18n="dropPrompt">タップして画像を選択</span>
        </div>
        <input type="file" id="image-file" accept="image/*" />
      </div>

      <div id="preview-container">
        <img id="preview-image" alt="Preview" />
        <button id="btn-change-image" class="change-image-btn" data-i18n="changeImage">変更</button>
      </div>

      <!-- Settings Card -->
      <div class="card">
        <div class="setting-row">
          <label for="size-select" data-i18n="size">サイズ</label>
          <select id="size-select">
            <optgroup label="A">
              <option value="A0">A0</option>
              <option value="A1">A1</option>
              <option value="A2">A2</option>
              <option value="A3">A3</option>
              <option value="A4" selected>A4</option>
              <option value="A5">A5</option>
            </optgroup>
            <optgroup label="B">
              <option value="B0">B0</option>
              <option value="B1">B1</option>
              <option value="B2">B2</option>
              <option value="B3">B3</option>
              <option value="B4">B4</option>
              <option value="B5">B5</option>
            </optgroup>
            <option value="custom" data-i18n="custom">カスタム</option>
          </select>
        </div>

        <div id="size-display" class="size-display">210 × 297 mm</div>

        <div class="setting-row" id="custom-size-group" style="display: none;">
          <label data-i18n="customLabel">カスタム</label>
          <div class="custom-size-inputs">
            <input type="number" id="custom-width" data-i18n-placeholder="widthPlaceholder" placeholder="幅" min="1" value="210" />
            <span class="multiply">×</span>
            <input type="number" id="custom-height" data-i18n-placeholder="heightPlaceholder" placeholder="高さ" min="1" value="297" />
            <span class="unit">mm</span>
          </div>
        </div>

        <div class="setting-row">
          <label data-i18n="orientation">向き</label>
          <div class="orientation-toggle">
            <button id="btn-portrait" class="toggle-btn active" data-i18n-title="portraitTitle" title="縦">
              <svg width="16" height="20" viewBox="0 0 16 20" fill="currentColor"><rect x="1" y="1" width="14" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button id="btn-landscape" class="toggle-btn" data-i18n-title="landscapeTitle" title="横">
              <svg width="20" height="16" viewBox="0 0 20 16" fill="currentColor"><rect x="1" y="1" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- AR Button -->
      <button id="btn-ar" class="ar-button" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3L2 7.5V16.5L12 21L22 16.5V7.5L12 3Z"/><path d="M12 12L2 7.5"/><path d="M12 12V21"/><path d="M12 12L22 7.5"/>
        </svg>
        <span data-i18n="arButton">ARで見る</span>
      </button>
      <p id="status" class="status"></p>

      <div id="model-viewer-container"></div>

    </div>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
